<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <!-- Font Awesome CDN for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
      
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
      }
      
      body{
        background: #1abc9c;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      
      .container{
        max-width: 440px;
        width: 100%;
        padding: 0 20px;
      }
      
      .wrapper{
        width: 100%;
        background: #fff;
        border-radius: 5px;
        box-shadow: 0px 4px 10px 1px rgba(0,0,0,0.1);
      }
      
      .wrapper .title{
        height: 90px;
        background: #16a085;
        border-radius: 5px 5px 0 0;
        color: #fff;
        font-size: 30px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .wrapper .content{
        padding: 25px;
        text-align: center;
      }

      .wrapper p {
        color: #666;
        margin-bottom: 20px;
        font-size: 16px;
      }
      
      .wrapper form .row{
        height: 45px;
        margin-bottom: 15px;
        position: relative;
      }
      
      .wrapper form .row input{
        height: 100%;
        width: 100%;
        outline: none;
        padding-left: 60px;
        border-radius: 5px;
        border: 1px solid lightgrey;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      
      form .row input:focus{
        border-color: #16a085;
        box-shadow: inset 0px 0px 2px 2px rgba(22,160,133,0.25);
      }
      
      .wrapper form .row i{
        position: absolute;
        width: 47px;
        height: 100%;
        color: #fff;
        font-size: 18px;
        background: #16a085;
        border: 1px solid #16a085;
        border-radius: 5px 0 0 5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .wrapper form .button input{
        color: #fff;
        font-size: 20px;
        font-weight: 500;
        padding-left: 0px;
        background: #16a085;
        border: 1px solid #16a085;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      form .button input:hover{
        background: #12876f;
      }

      .flash-messages p{
        color: #e74c3c;
        font-size: 14px;
        background: #f8d7da;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="title"><span>Verify Email</span></div>
        <div class="content">
          <p>We sent a verification code to your email. Please enter it below.</p>

          <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <p>{{ message }}</p>
                {% endfor %}
              {% endif %}
            {% endwith %}
          </div>

          <form method="POST">
            <div class="row">
              <i class="fas fa-key"></i>
              <input type="text" name="code" placeholder="Enter the 6-digit code" required>
            </div>
            <div class="row button">
              <input type="submit" value="Verify">
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
